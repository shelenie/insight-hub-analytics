# OAuth callbacks, webhooks, and platform sync functions cannot rely on the
# Supabase gateway JWT because external providers or internal schedulers call
# them without a user session. These functions perform their own validation
# using OAuth state, webhook signatures, or backend/internal secrets, while
# user-triggered functions remain JWT-protected.
[functions.meta-oauth-callback]
verify_jwt = false

[functions.google-ads-oauth-callback]
verify_jwt = false

[functions.tiktok-oauth-callback]
verify_jwt = false

[functions.facebook-lead-webhook]
verify_jwt = false

[functions.meta-ads-sync]
verify_jwt = false

[functions.google-ads-sync]
verify_jwt = false

[functions.tiktok-ads-sync]
verify_jwt = false

[functions.facebook-lead-ads-sync]
verify_jwt = false

[functions.telegram-webhook]
verify_jwt = false

[functions.telegram-dispatch]
verify_jwt = false

[functions.meta-oauth-start]
verify_jwt = true

[functions.google-ads-oauth-start]
verify_jwt = true

[functions.tiktok-oauth-start]
verify_jwt = true

[functions.ads-scheduled-sync-run]
verify_jwt = true

[functions.ai-helper-run]
verify_jwt = true
