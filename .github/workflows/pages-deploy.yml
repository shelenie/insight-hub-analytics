name: Publish site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: https://iaxqonjwgrqpgvbeydok.supabase.co
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Validate lint
        run: npm run lint --if-present

      - name: Validate Supabase project for Pages build
        run: |
          test -n "$VITE_SUPABASE_URL"
          echo "$VITE_SUPABASE_URL" | grep "iaxqonjwgrqpgvbeydok.supabase.co"

      - name: Validate build
        run: npm run build

      - name: Build for GitHub Pages
        run: GITHUB_PAGES=true npm run build

      - name: Validate built artifact uses production Supabase project
        run: |
          if grep -R "zbonqzvqxotuwmsorwsf.supabase.co" dist; then
            echo "Found disallowed Supabase URL in build output"
            exit 1
          fi
          grep -R "iaxqonjwgrqpgvbeydok.supabase.co" dist

      - name: Create SPA fallback
        run: cp dist/index.html dist/404.html

      - name: Disable Jekyll
        run: touch dist/.nojekyll

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
